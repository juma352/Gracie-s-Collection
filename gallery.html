<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Mawingu Photography</title>
    
    <!-- Google Fonts for Artistic Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,500;1,600;1,700;1,800;1,900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Dancing+Script:wght@400;500;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400;1,600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Alpine.js -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="js/content-loader.js" defer></script>
    
    <!-- Custom Typography Styles -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen font-artistic-body">

    <!-- Navbar -->
    <nav class="bg-white/95 backdrop-blur-sm shadow-xl border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-6 py-2 flex justify-between items-center">
            <a href="index.html" class="flex items-center group transition-all duration-300 hover:scale-105 logo-container">
                <img src="images/clear Mawingu.png" alt="Mawingu Photography Logo" 
                     class="h-20 w-auto logo-enhanced">
            </a>
            <div class="flex space-x-10">
                <a href="gallery.html" class="relative font-artistic-sub text-blue-600 font-semibold text-lg transition-all duration-300 letter-spacing-wide after:content-[''] after:absolute after:w-full after:h-1 after:bottom-0 after:left-0 after:bg-gradient-to-r after:from-blue-600 after:to-purple-600 after:rounded-full">Gallery</a>
                <a href="about.html" class="relative font-artistic-sub text-gray-700 font-semibold text-lg hover:text-blue-600 transition-all duration-300 letter-spacing-wide after:content-[''] after:absolute after:w-0 after:h-1 after:bottom-0 after:left-0 after:bg-gradient-to-r after:from-blue-600 after:to-purple-600 after:transition-all after:duration-300 hover:after:w-full after:rounded-full transform hover:-translate-y-1">About</a>
                <a href="contact.html" class="relative font-artistic-sub text-gray-700 font-semibold text-lg hover:text-blue-600 transition-all duration-300 letter-spacing-wide after:content-[''] after:absolute after:w-0 after:h-1 after:bottom-0 after:left-0 after:bg-gradient-to-r after:from-blue-600 after:to-purple-600 after:transition-all after:duration-300 hover:after:w-full after:rounded-full transform hover:-translate-y-1">Contact</a>
            </div>
        </div>
    </nav>

    <main class="flex-grow">
        <!-- Gallery Header -->
        <section class="bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white py-20">
            <div class="container mx-auto px-4 text-center">
                <h1 class="font-artistic-heading text-6xl font-bold mb-6 text-gradient animate-fade-in-down">Gallery</h1>
                <p class="font-artistic-body text-xl text-gray-300 max-w-2xl mx-auto animate-fade-in-up delay-300">
                    Explore our curated collections of visual stories, each capturing unique moments and emotions through the lens of artistic excellence.
                </p>
            </div>
        </section>

        <!-- Collections Grid -->
        <section class="py-20 bg-white">
            <div class="container mx-auto px-4">
                <div id="gallery-collections" class="grid grid-cols-1 lg:grid-cols-2 gap-12 max-w-6xl mx-auto"></div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="bg-gray-900 text-white py-6 text-center">
        <p>&copy; 2025 Grace Matu Photography — All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const data = await SiteContent.loadJSON('content/gallery.json');
                document.getElementById('gallery-collections').innerHTML = SiteContent.renderGalleryCards(data.collections);
            } catch (error) {
                console.warn('Gallery content could not be loaded.', error);
            }
        });
    </script>

</body>
</html>
